<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nonogram Pictures</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #cac3b5;
      color: #363431;
      font-family: system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    canvas {
      image-rendering: pixelated;
      max-width: 100vw;
      max-height: 100vh;
      outline: none;
    }

    #status {
      position: fixed;
      left: 16px;
      bottom: 14px;
      font-size: 13px;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  <script src="howler.min.js"></script>
  <script src="wasm_exec.js"></script>
  <script>
    const music = new Howl({
      src: ["audio/tunetank-lounge-jazz-elevator-music-348999.mp3"],
      loop: true,
      volume: 0.35,
      html5: true
    });
    const sfx = {
      pencil: new Howl({
        src: ["audio/u_o8xh7gwsrj-app_interface_click_2-476372.mp3"],
        volume: 0.65
      }),
      eraser: new Howl({
        src: ["audio/audley_fergine-ui-button-click-5-327756.mp3"],
        volume: 0.65
      }),
      correct: new Howl({
        src: ["audio/liecio-menu_beep_accept_soft-533780.mp3"],
        volume: 0.8
      }),
      complete: new Howl({
        src: ["audio/koiroylers-awesome-level-up-351714.mp3"],
        volume: 0.85
      })
    };
    window.setMusicMuted = (muted) => Howler.mute(muted);
    window.playSFX = (name) => {
      const sound = sfx[name];
      if (sound) {
        sound.play();
      }
    };

    const startMusic = () => {
      if (!music.playing()) {
        music.play();
      }
      window.removeEventListener("pointerdown", startMusic);
      window.removeEventListener("keydown", startMusic);
    };
    window.addEventListener("pointerdown", startMusic, { once: true });
    window.addEventListener("keydown", startMusic, { once: true });

    const go = new Go();
    WebAssembly.instantiateStreaming(fetch("game.wasm"), go.importObject).then((result) => {
      document.getElementById("status").remove();
      go.run(result.instance);
    }).catch((err) => {
      document.getElementById("status").textContent = err;
      console.error(err);
    });

    if (["localhost", "127.0.0.1"].includes(window.location.hostname)) {
      let wasmVersion = "";
      setInterval(async () => {
        try {
          const response = await fetch("game.wasm", { method: "HEAD", cache: "no-store" });
          const nextVersion = `${response.headers.get("last-modified")}:${response.headers.get("content-length")}`;
          if (!wasmVersion) {
            wasmVersion = nextVersion;
          } else if (nextVersion && nextVersion !== wasmVersion) {
            window.location.reload();
          }
        } catch {
          // Dev-only polling should never interrupt gameplay.
        }
      }, 1200);
    }
  </script>
</body>
</html>
